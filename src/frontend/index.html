<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto Jarvis</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- <link rel="stylesheet" href="css/animations.css"> --> 

    <!--
    
    link do site: https://www.scaler.com/topics/chat-interface-project-css/ 
    link do repo dos icones: https://www.svgrepo.com/ 
    
    -->

</head>
<body>
    <!-- Main container -->    
    <div class="main-chat-container">

        <!-- Cabeçalho Chat header -->
         <div class="header-container">
            <!-- conteudo header -->            
            <div class="msg-header">
                <div class="icone-chat">
                    <img src="assets/icon-jarvis.svg" alt="SVG do Jarvis">
                </div>
                <div class="titulo-chat">
                    <h1>Assistente Jarvis</h1>
                </div>
            </div>
         </div>

        <!-- Área de mensagens Chat messages area -->
        <div class="cotainer-cropped" id="container-cropped">
            <div class="chatmessages" id="chat-messages">
                <div class="msg-bot">
                    <div class="chat-bot-icone">
                        <img src="assets/icon-jarvis.svg" alt="SVG do Jarvis">
                    </div>

                    <!-- Mensagem do bot -->
                    <div class="chat-bot-content">

                        <!-- Conteúdo da mensagem do bot -->
                        <span class="msg-bot" id="msg-bot">
                            <p>Olá, sou Jarvis, seu assistente virtual. Em que posso ajudar?</p>
                        </span>
                        <!-- hora que a mensagem foi enviada -->
                        <span class="chat-bot-time" id="chat-bot-time">
                            <p>12:00 PM</p>
                        </span>

                    </div>

                </div>

                <!-- Mensagem do usuário -->
                <div class="chat-user-content">
                    
                    <div class="chat-user-icone">
                        <img src="assets/icone-user.png" alt="Ícone do Usuário">
                    </div>
                    <!-- Conteúdo da mensagem do usuário -->
                    <span class="msg-user" id="msg-user">
                        <p>Olá, Jarvis! Como você está?</p>
                    </span>

                    <!-- hora que a mensagem foi enviada -->
                    <span class="chat-user-time" id="chat-user-time">
                        <p>12:00 PM</p>
                    </span>

                </div>

            </div>
        </div>
        
        <!-- Input de mensagem do usuário-->
        <div class="container-prompt">
            <img action="input" src="assets/clip-svgrepo-com.svg" alt="svg-clip" class="clip-icon">
            
            <form id="chat-form" class="chat-form">                
                <input type="text" id="user-input" placeholder="Digite sua mensagem..." autocomplete="off" required>
                <button type="submit">Enviar</button>
            </form>

        </div>
        
    </div>
    
    <script src="js/app.js"></script>
    
</body>
</html>
